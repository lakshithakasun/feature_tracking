# =============================================================================
# WSO2 Identity Server — Feature Taxonomy
# =============================================================================
# Schema   : https://wso2.com/schemas/feature-taxonomy/v1
# Product  : WSO2 Identity Server (IS)
# Maintainer: Identity Server Engineering Team
# Reference: https://is.docs.wso2.com/en/latest/
# =============================================================================

schema:
  version: "1.0.0"
  id: "https://wso2.com/schemas/feature-taxonomy/v1"

# -----------------------------------------------------------------------------
# PRODUCT
# -----------------------------------------------------------------------------

product:
  id: "identity-server"
  name: "WSO2 Identity Server"
  version: "7.2.0"
  description: "Customer identity and access management (CIAM) platform providing SSO, MFA, federation, and user lifecycle management."
  team_owner: "identity-server-engineering"
  category: "identity-access"
  is_active: true

# -----------------------------------------------------------------------------
# FEATURE CATEGORIES
# -----------------------------------------------------------------------------

categories:
  - id: "sso"
    name: "Single Sign-On (SSO)"
    description: "Authentication protocols for enabling SSO across applications."

  - id: "mfa"
    name: "Multi-Factor Authentication (MFA)"
    description: "Second and additional factor authenticators and passwordless login."
    sub_categories:
      - id: "adaptive-auth"
        name: "Adaptive / Conditional Authentication"
        description: "Risk-based and conditional MFA step-up authentication using scripts and templates."

  - id: "user-management"
    name: "User Management"
    description: "User onboarding, profile management, account recovery, and self-service."
    sub_categories:
      - id: "user-stores"
        name: "User Stores"
        description: "Configuration and management of user directories (JDBC, LDAP, AD)."
      - id: "provisioning"
        name: "User Provisioning"
        description: "Inbound and outbound user provisioning across systems."
      - id: "self-service"
        name: "User Self-Service"
        description: "End-user self-service capabilities via My Account portal."

  - id: "app-management"
    name: "Application Management"
    description: "Registering and configuring client applications."
    sub_categories:
      - id: "branding"
        name: "Branding & UX"
        description: "Customizing login flows, themes, and end-user experience."

  - id: "federation"
    name: "Identity Federation"
    description: "Connecting external identity providers for social and enterprise login."
    sub_categories:
      - id: "social-login"
        name: "Social Login"
        description: "Social identity provider integrations (Google, Facebook, GitHub, etc.)."
      - id: "enterprise-login"
        name: "Enterprise Login"
        description: "Enterprise IdP connections (SAML, OIDC, WS-Fed, IWA, AD FS)."
      - id: "eid-login"
        name: "eID Login"
        description: "Electronic identity provider integrations (Signicat, FranceConnect, SwissID)."

  - id: "authorization"
    name: "Authorization"
    description: "Role-based access control, permissions, and fine-grained authorization."

  - id: "governance"
    name: "Identity Governance"
    description: "Password policies, session management, account locking, and audit."

  - id: "org-management"
    name: "Organization Management (B2B)"
    description: "Multi-tenant B2B organization hierarchy management."

  - id: "customization"
    name: "Customization & Extensions"
    description: "Service extensions, webhooks, identity verification, and workflow approvals."

# -----------------------------------------------------------------------------
# FEATURES
# code convention: is.<category-id>.<action>
# Note: tier, status, and availability fields are omitted where not confirmed.
# -----------------------------------------------------------------------------

features:

  # ============================================================
  # SSO
  # ============================================================

  - code: "is.sso.oidc"
    name: "OpenID Connect / OAuth 2.0 SSO"
    description: "Configure OIDC/OAuth 2.0 based single sign-on for registered applications."
    category: "sso"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.sso.oidc"
      event_category: "engagement"
      platforms: ["web", "api", "mobile-ios", "mobile-android"]
      dimensions:
        - name: "grant_type"
          type: "enum"
          values: ["authorization-code", "implicit", "client-credentials", "device-code", "hybrid", "jwt-bearer", "token-exchange"]
          required: true
        - name: "pkce_enabled"
          type: "boolean"
          required: false
          description: "Whether PKCE was used in the flow."
        - name: "response_type"
          type: "enum"
          values: ["code", "token", "id-token", "code-token", "code-id-token"]
          required: true
      aggregations:
        - type: "count"
          label: "OIDC SSO Logins"
        - type: "count_distinct"
          dimension: "grant_type"
          label: "Grant Types Used"

  - code: "is.sso.saml"
    name: "SAML 2.0 SSO"
    description: "Configure SAML 2.0 based single sign-on for service provider applications."
    category: "sso"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.sso.saml"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "binding_type"
          type: "enum"
          values: ["http-post", "http-redirect", "artifact"]
          required: true
        - name: "assertion_encryption"
          type: "boolean"
          required: false
      aggregations:
        - type: "count"
          label: "SAML SSO Logins"

  - code: "is.sso.ws-federation"
    name: "WS-Federation SSO"
    description: "Configure WS-Federation passive requestor profile for legacy application SSO."
    category: "sso"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.sso.ws-federation"
      event_category: "engagement"
      platforms: ["web"]
      dimensions: []
      aggregations:
        - type: "count"
          label: "WS-Federation SSO Logins"

  # ============================================================
  # MFA
  # ============================================================

  - code: "is.mfa.totp"
    name: "TOTP (Authenticator App)"
    description: "Time-based one-time password authentication using apps like Google Authenticator or Microsoft Authenticator."
    category: "mfa"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.totp"
      event_category: "engagement"
      platforms: ["web", "mobile-ios", "mobile-android"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["enroll", "verify", "verify-failed"]
          required: true
      aggregations:
        - type: "count"
          label: "TOTP Authentications"

  - code: "is.mfa.email-otp"
    name: "Email OTP"
    description: "Send a one-time passcode to the user's registered email address as a second factor."
    category: "mfa"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.email-otp"
      event_category: "engagement"
      platforms: ["web", "mobile-ios", "mobile-android"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["sent", "verified", "verify-failed", "expired"]
          required: true
      aggregations:
        - type: "count"
          label: "Email OTP Authentications"

  - code: "is.mfa.sms-otp"
    name: "SMS OTP"
    description: "Send a one-time passcode to the user's registered mobile number as a second factor."
    category: "mfa"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.sms-otp"
      event_category: "engagement"
      platforms: ["web", "mobile-ios", "mobile-android"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["sent", "verified", "verify-failed", "expired"]
          required: true
        - name: "sms_provider"
          type: "enum"
          values: ["twilio", "vonage", "custom"]
          required: false
      aggregations:
        - type: "count"
          label: "SMS OTP Authentications"

  - code: "is.mfa.passkey"
    name: "Passkey / FIDO2 (WebAuthn)"
    description: "Passwordless authentication using device biometrics or hardware security keys via FIDO2/WebAuthn."
    category: "mfa"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.passkey"
      event_category: "adoption"
      platforms: ["web", "mobile-ios", "mobile-android", "desktop"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["enroll", "authenticate", "auth-failed"]
          required: true
        - name: "authenticator_type"
          type: "enum"
          values: ["platform", "cross-platform"]
          required: false
          description: "Platform = device biometrics; cross-platform = security key."
      aggregations:
        - type: "count"
          label: "Passkey Authentications"

  - code: "is.mfa.magic-link"
    name: "Magic Link (Passwordless Email)"
    description: "Send a one-click login link to the user's email for passwordless authentication."
    category: "mfa"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.magic-link"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["sent", "clicked", "verified", "expired"]
          required: true
      aggregations:
        - type: "count"
          label: "Magic Link Authentications"

  - code: "is.mfa.push-notification"
    name: "Push Notification Authentication"
    description: "Authenticate users via push notification to a registered mobile device."
    category: "mfa"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.push-notification"
      event_category: "engagement"
      platforms: ["web", "mobile-ios", "mobile-android"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["sent", "approved", "denied", "expired"]
          required: true
      aggregations:
        - type: "count"
          label: "Push Notification Authentications"

  - code: "is.mfa.x509"
    name: "X.509 Certificate Authentication"
    description: "Authenticate users using client X.509 digital certificates."
    category: "mfa"
    tier: "enterprise"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.x509"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["authenticate", "auth-failed"]
          required: true
      aggregations:
        - type: "count"
          label: "X.509 Authentications"

  - code: "is.mfa.backup-codes"
    name: "Backup Codes"
    description: "Generate and use single-use backup codes as a fallback MFA method."
    category: "mfa"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.mfa.backup-codes"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["generated", "used", "regenerated"]
          required: true
      aggregations:
        - type: "count"
          label: "Backup Code Usages"

  # ============================================================
  # ADAPTIVE / CONDITIONAL AUTHENTICATION
  # ============================================================

  - code: "is.adaptive-auth.conditional-auth"
    name: "Conditional Authentication"
    description: "Dynamically adjust authentication steps based on risk signals using conditional authentication scripts and templates."
    category: "adaptive-auth"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.adaptive-auth.conditional-auth"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "template"
          type: "enum"
          values:
            - "role-based"
            - "group-based"
            - "ip-based"
            - "new-device-based"
            - "login-attempt-based"
            - "concurrent-session-based"
            - "user-age-based"
            - "user-store-based"
            - "passkey-progressive-enrollment"
            - "elk-risk-based"
            - "typingdna-based"
            - "custom"
          required: true
        - name: "step_up_method"
          type: "enum"
          values: ["totp", "email-otp", "sms-otp", "passkey", "push-notification", "deny"]
          required: false
        - name: "outcome"
          type: "enum"
          values: ["step-up-triggered", "step-up-not-triggered", "access-denied"]
          required: true
      aggregations:
        - type: "count"
          label: "Conditional Auth Evaluations"
        - type: "count_distinct"
          dimension: "template"
          label: "Templates Used"

  - code: "is.adaptive-auth.app-native-auth"
    name: "App-Native Authentication"
    description: "Enable native authentication flows within mobile and SPA applications without browser redirects."
    category: "adaptive-auth"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.adaptive-auth.app-native-auth"
      event_category: "adoption"
      platforms: ["mobile-ios", "mobile-android", "web"]
      dimensions:
        - name: "app_type"
          type: "enum"
          values: ["mobile", "spa"]
          required: true
      aggregations:
        - type: "count"
          label: "App-Native Auth Flows"

  # ============================================================
  # USER MANAGEMENT
  # ============================================================

  - code: "is.user-management.self-registration"
    name: "User Self-Registration"
    description: "End users register their own accounts via the sign-up portal."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.self-registration"
      event_category: "adoption"
      platforms: ["web", "api"]
      dimensions:
        - name: "verification_method"
          type: "enum"
          values: ["email", "sms", "admin-approval", "none"]
          required: true
        - name: "outcome"
          type: "enum"
          values: ["success", "failed", "pending-verification"]
          required: true
      aggregations:
        - type: "count"
          label: "Self-Registrations"

  - code: "is.user-management.invite-user"
    name: "Invitation-Based User Onboarding"
    description: "Administrators onboard users by sending email invitations to set up their accounts."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.invite-user"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "outcome"
          type: "enum"
          values: ["invited", "accepted", "expired"]
          required: true
      aggregations:
        - type: "count"
          label: "User Invitations Sent"

  - code: "is.user-management.admin-onboard"
    name: "Admin User Onboarding"
    description: "Administrators directly create user accounts via the console or management APIs."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.admin-onboard"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "method"
          type: "enum"
          values: ["console", "scim-api", "admin-api"]
          required: true
      aggregations:
        - type: "count"
          label: "Admin User Creations"

  - code: "is.user-management.account-recovery"
    name: "Account Recovery"
    description: "Users recover access to locked or forgotten accounts via email, security questions, or admin reset."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.account-recovery"
      event_category: "engagement"
      platforms: ["web", "api"]
      dimensions:
        - name: "recovery_type"
          type: "enum"
          values: ["password-recovery", "username-recovery"]
          required: true
        - name: "recovery_method"
          type: "enum"
          values: ["email-link", "security-questions", "admin-reset", "sms-otp"]
          required: true
        - name: "outcome"
          type: "enum"
          values: ["success", "failed", "expired"]
          required: true
      aggregations:
        - type: "count"
          label: "Account Recoveries"
        - type: "count_distinct"
          dimension: "recovery_method"
          label: "Recovery Methods Used"

  - code: "is.user-management.bulk-import"
    name: "Bulk User Import"
    description: "Import users in bulk via CSV file upload or SCIM 2.0 bulk endpoint."
    category: "user-management"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.bulk-import"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "import_method"
          type: "enum"
          values: ["csv-upload", "scim-bulk", "admin-api"]
          required: true
        - name: "user_count"
          type: "integer"
          required: true
          description: "Number of users in the import batch."
        - name: "outcome"
          type: "enum"
          values: ["success", "partial", "failed"]
          required: true
      aggregations:
        - type: "count"
          label: "Bulk Import Jobs"
        - type: "sum"
          dimension: "user_count"
          label: "Total Users Imported"

  - code: "is.user-management.group-management"
    name: "Group Management"
    description: "Create and manage user groups for organizational structure and access control."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.group-management"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["created", "updated", "deleted", "user-assigned", "user-removed"]
          required: true
      aggregations:
        - type: "count"
          label: "Group Management Actions"

  - code: "is.user-management.user-attributes"
    name: "User Attribute Configuration"
    description: "Configure user profile attributes, SCIM2 mappings, unique attributes, and multi-valued contact attributes."
    category: "user-management"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-management.user-attributes"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["attribute-added", "attribute-updated", "attribute-deleted", "mapping-configured"]
          required: true
      aggregations:
        - type: "count"
          label: "Attribute Configuration Changes"

  # ---- USER STORES ----

  - code: "is.user-stores.configure"
    name: "User Store Configuration"
    description: "Configure primary and secondary user stores including JDBC, LDAP, Active Directory, and custom user stores."
    category: "user-stores"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.user-stores.configure"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "store_type"
          type: "enum"
          values: ["jdbc", "ldap-read-only", "ldap-read-write", "active-directory", "custom"]
          required: true
        - name: "action"
          type: "enum"
          values: ["configured", "updated", "deleted"]
          required: true
        - name: "store_level"
          type: "enum"
          values: ["primary", "secondary"]
          required: true
      aggregations:
        - type: "count"
          label: "User Store Configurations"
        - type: "count_distinct"
          dimension: "store_type"
          label: "User Store Types Used"

  # ---- PROVISIONING ----

  - code: "is.provisioning.inbound-scim"
    name: "Inbound SCIM 2.0 Provisioning"
    description: "Provision users into the Identity Server from external systems via the SCIM 2.0 API."
    category: "provisioning"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.provisioning.inbound-scim"
      event_category: "lifecycle"
      platforms: ["api"]
      dimensions:
        - name: "operation"
          type: "enum"
          values: ["create", "update", "delete", "bulk"]
          required: true
      aggregations:
        - type: "count"
          label: "Inbound SCIM Operations"

  - code: "is.provisioning.outbound"
    name: "Outbound User Provisioning"
    description: "Automatically provision user lifecycle events (create, update, delete) to external systems."
    category: "provisioning"
    tier: "premium"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.provisioning.outbound"
      event_category: "lifecycle"
      platforms: ["web", "api"]
      dimensions:
        - name: "connector"
          type: "enum"
          values: ["google", "salesforce", "scim2", "custom"]
          required: true
        - name: "operation"
          type: "enum"
          values: ["create", "update", "delete"]
          required: true
        - name: "trigger"
          type: "enum"
          values: ["admin-action", "self-signup", "jit-provisioning", "api"]
          required: false
      aggregations:
        - type: "count"
          label: "Outbound Provisioning Events"
        - type: "count_distinct"
          dimension: "connector"
          label: "Provisioning Connectors Used"

  - code: "is.provisioning.jit"
    name: "Just-in-Time (JIT) Provisioning"
    description: "Automatically provision user accounts during federated login when users authenticate via an external IdP for the first time."
    category: "provisioning"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.provisioning.jit"
      event_category: "adoption"
      platforms: ["web"]
      dimensions:
        - name: "idp_protocol"
          type: "enum"
          values: ["oidc", "saml", "social"]
          required: true
        - name: "outcome"
          type: "enum"
          values: ["provisioned", "existing-user-linked", "failed"]
          required: true
      aggregations:
        - type: "count"
          label: "JIT Provisioning Events"

  # ---- SELF-SERVICE (My Account) ----

  - code: "is.self-service.profile-management"
    name: "Self-Service Profile Management"
    description: "Users update their own profile information via the My Account portal."
    category: "self-service"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.self-service.profile-management"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["view-profile", "update-profile", "change-password", "export-profile"]
          required: true
      aggregations:
        - type: "count"
          label: "Self-Service Profile Actions"

  - code: "is.self-service.consent-management"
    name: "Self-Service Consent Management"
    description: "Users view and manage their consent grants for applications sharing their personal data."
    category: "self-service"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.self-service.consent-management"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["view-consents", "revoke-consent"]
          required: true
      aggregations:
        - type: "count"
          label: "Consent Management Actions"

  - code: "is.self-service.linked-accounts"
    name: "Linked Social Accounts"
    description: "Users link or unlink their social identity provider accounts from the My Account portal."
    category: "self-service"
    tier: "core"
    status: "stable"
    availability:
      introduced_in: "7.2.0"
    tracking:
      event_name: "is.self-service.linked-accounts"
      event_category: "engagement"
      platforms: ["web"]
      dimensions:
        - name: "action"
          type: "enum"
          values: ["linked", "unlinked"]
          required: true
        - name: "provider"
