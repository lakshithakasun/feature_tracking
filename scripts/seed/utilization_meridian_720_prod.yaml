# Meridian Retail — Core tier, US West, v7.2.0 Production
# Profile: B2C retail — high OIDC volume, heavy social login (4 providers),
#          magic link, self-registration funnel, deep self-service, branding, bot detection
product:
  id: "identity-server"
  name: "WSO2 Identity Server"
  version: "7.2.0"

deployment:
  id: "meridian-prod-us"
  customer_id: "meridian"

report:
  from: "2026-03-01T00:00:00Z"
  to: "2026-03-31T23:59:59Z"

features:
