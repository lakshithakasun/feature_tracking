# Zephyr Logistics — Premium tier, EU Central, v7.3.0 Production
# Profile: Multi-tenant SaaS logistics platform — full org management suite,
#          enterprise federation (SAML+OIDC+M365), SCIM+JIT provisioning, webhooks, service extensions
product:
  id: "identity-server"
  name: "WSO2 Identity Server"
  version: "7.3.0"

deployment:
  id: "zephyr-prod-eu"
  customer_id: "zephyr"

report:
  from: "2026-03-01T00:00:00Z"
  to: "2026-03-31T23:59:59Z"

features:
  - code: "is.sso.oidc"
    utilization:
      total_count: 35000
      dimension_breakdown:
        grant_type: { authorization-code: 26000, client-credentials: 9000 }
        response_type: { code: 32000, id-token: 3000 }

  - code: "is.sso.saml"
    utilization:
      total_count: 11000
      dimension_breakdown:
        binding_type: { http-post: 8500, http-redirect: 2500 }
        assertion_encryption: { "true": 11000 }

  - code: "is.mfa.totp"
    utilization:
      total_count: 8200
      dimension_breakdown:
        action: { verify: 7900, enroll: 250, verify-failed: 50 }

  - code: "is.mfa.email-otp"
