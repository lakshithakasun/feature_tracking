          enroll: 50
          authenticate: 340
          auth-failed: 10
        authenticator_type:
          platform: 350
          cross-platform: 50

  # ── ADAPTIVE AUTH ─────────────────────────────────────────────────────────

  - code: "is.adaptive-auth.conditional-auth"
    utilization:
      total_count: 8500
      dimension_breakdown:
        template:
          ip-based: 4000
          new-device-based: 3000
          role-based: 1500
        outcome:
          step-up-triggered: 3200
          step-up-not-triggered: 5200
          access-denied: 100

  # ── USER MANAGEMENT ───────────────────────────────────────────────────────

  - code: "is.user-management.self-registration"
    utilization:
      total_count: 320
      dimension_breakdown:
        verification_method:
          email: 300
          sms: 20
        outcome:
          success: 290
          failed: 15
          pending-verification: 15

  - code: "is.user-management.account-recovery"
    utilization:
      total_count: 85
      dimension_breakdown:
        recovery_type:
          password-recovery: 80
          username-recovery: 5
        recovery_method:
          email-link: 75
          admin-reset: 10

  # ── SOCIAL LOGIN ──────────────────────────────────────────────────────────

  - code: "is.social-login.google"
    utilization:
      total_count: 2100
      dimension_breakdown:
        action:
          login-success: 2050
          login-failed: 50

  - code: "is.social-login.microsoft"
    utilization:
      total_count: 950
      dimension_breakdown:
        action:
          login-success: 920
          login-failed: 30

  - code: "is.mfa.magic-link"

  # ── ORGANIZATION MANAGEMENT ───────────────────────────────────────────────

  - code: "is.org-management.create-organization"
    utilization:
      total_count: 12
      dimension_breakdown:
        onboarding_type:
          sales-led: 10
          self-service: 2
